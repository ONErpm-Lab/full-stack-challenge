services:
    app:
        build:
            context: .
            dockerfile: ./docker/dev/Dockerfile
        container_name: music-api
        extra_hosts:
            - localhost:host-gateway
        volumes:
            - ./:/var/www
        ports:
            - 80:8000
        depends_on:
            - mysql
            - redis
            - mailpit

    mysql:
        image: mysql:8
        volumes:
            - music-mysql:/var/lib/mysql
        ports:
            - 3306:3306
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

    redis:
        image: redis:alpine
        ports:
            - 6379:6379
        volumes:
            - music-redis:/data
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    mailpit:
        image: axllent/mailpit:latest
        ports:
            - 1025:1025
            - 8025:8025

volumes:
    music-mysql:
    music-redis:
